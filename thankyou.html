<style>
  /* ── Полноэкранный центр ── */
  .ty-stage {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 36px;
    padding: 120px 24px 60px;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  /* ── Главный заголовок ── */
  .ty-headline {
    font-family: var(--font-d);
    font-size: clamp(56px, 11vw, 130px);
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 0.88;
    color: #fff;
    user-select: none;
  }
  .ty-headline em {
    font-style: normal;
    color: var(--acc);
  }

  /* ── Подстрока ── */
  .ty-caption {
    font-family: var(--font-m);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-3);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .ty-caption::before,
  .ty-caption::after {
    content: "";
    display: block;
    width: 28px;
    height: 1px;
    background: var(--rule);
  }

  /* ── Таймер ── */
  .ty-timer { display: flex; align-items: center; justify-content: center; }
  .ty-timer svg { display: none; }
  .ty-num {
    font-family: var(--font-d);
    font-size: 80px;
    font-weight: 700;
    color: var(--acc);
    line-height: 1;
    letter-spacing: 0;
  }

  /* ── Кнопка fallback ── */
  .ty-fallback {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .ty-fallback-label {
    font-family: var(--font-m);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
  }

  /* ── Мобильная адаптация ── */
  @media (max-width: 480px) {
    .ty-stage { gap: 28px; padding-top: 100px; }
    .ty-num { font-size: 64px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .ty-ring-fill { transition: none; }
  }
</style>
</head>
<body data-page="">

<div class="ty-stage">

  <div class="ty-headline">
    СПАСИБО<br>ЗА <em>ДОВЕРИЕ</em>.
  </div>

  <p class="ty-caption">Переводим вас в Telegram</p>

  <div class="ty-timer">
    <svg id="tyRingSvg" width="110" height="110" viewBox="0 0 110 110" aria-hidden="true">
      <circle class="ty-ring-bg"   cx="55" cy="55" r="46" fill="none" stroke-width="2.5"/>
      <circle class="ty-ring-fill" cx="55" cy="55" r="46" fill="none" stroke-width="2.5"
              id="tyRingFill"/>
    </svg>
    <div class="ty-num" id="tyNum" aria-live="polite">3</div>
  </div>

  <div class="ty-fallback">
    <span class="ty-fallback-label">Если переход не произошёл</span>
    <a class="btn-secondary" id="tyBtn" href="#" rel="noopener">Открыть Telegram вручную →</a>
  </div>

</div>

<script>
(function(){
  /* ── Читаем целевой URL ── */
  var params  = new URLSearchParams(location.search);
  var target  = params.get('to');
  if (!target || !/^https:\/\/(t\.me|telegram\.me)/.test(target)) {
    target = 'https://t.me/Judgeopenclawbot';
  }

  /* ── Кнопка fallback ── */
  var btn = document.getElementById('tyBtn');
  if (btn) btn.href = target;

  /* ── Яндекс Метрика: цель telegram_click ── */
  if (typeof ym !== 'undefined') {
    try { ym(XXXXXXXX, 'reachGoal', 'telegram_click', { url: target }); } catch(e){}
  }

  /* ── Круговой таймер ── */
  var numEl  = document.getElementById('tyNum');
  var ring   = document.getElementById('tyRingFill');
  var r      = 46;
  var circ   = +(2 * Math.PI * r).toFixed(2); // 289.03

  ring.style.strokeDasharray  = circ;
  ring.style.strokeDashoffset = 0;

  var remaining = 3;
  numEl.textContent = remaining;

  /* Запускаем с небольшой задержкой — CSS успеет зафиксировать начальный offset */
  setTimeout(function tick() {
    remaining -= 1;
    var progress = remaining / 3; // 1 → 0.667 → 0.333 → 0
    ring.style.strokeDashoffset = +(circ * (1 - progress)).toFixed(2);

    if (remaining > 0) {
      numEl.textContent = remaining;
      setTimeout(tick, 1000);
    } else {
      numEl.textContent = '→';
      setTimeout(function(){ window.location.href = target; }, 350);
    }
  }, 80);

  /* Жёсткий fallback: если что-то пошло не так */
  setTimeout(function(){ window.location.href = target; }, 4500);
})();
</script>
